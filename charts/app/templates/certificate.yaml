{{- range $workload := .Values.spec.workloads }}
{{- if eq $workload.type "Deployment" }}
{{- $global := default (dict) $.Values.spec.global -}}
{{- $globalTls := default (dict) $global.tls -}}
{{- $tlsEnabled := $globalTls.enabled -}}
{{- if $workload.ingress }}
  {{- if and $workload.ingress.tls (hasKey $workload.ingress.tls "enabled") }}
    {{- $tlsEnabled = $workload.ingress.tls.enabled -}}
  {{- end }}
{{- end }}
{{- $createCertificate := default false $globalTls.createCertificate -}}
{{- $emitCert := false -}}
{{- if and $createCertificate $workload.ingress $workload.ingress.enabled $tlsEnabled $globalTls.clusterIssuer }}
  {{- $emitCert = true -}}
{{- end }}
{{- if $emitCert }}
{{- $tlsSecret := include "app.tlsSecretName" (list $ $workload) -}}
{{- $hosts := $workload.ingress.hosts -}}
{{- if not $hosts }}
  {{- $hosts = list (dict "host" "" "paths" (list (dict "path" "/" "pathType" "Prefix"))) -}}
{{- end }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ $tlsSecret }}
  namespace: {{ default "default" $global.namespace }}
  labels:
    {{- include "app.commonLabels" $ | nindent 4 }}
    app.kubernetes.io/component: {{ $workload.name }}
    {{- with $global.labels }}
{{ toYaml . | nindent 4 }}
    {{- end }}
spec:
  secretName: {{ $tlsSecret }}
  issuerRef:
    name: {{ $globalTls.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
  {{- range $hostEntry := $hosts }}
  {{- $host := $hostEntry.host }}
  {{- if not $host }}
    {{- $host = printf "%s.%s" $workload.name $global.baseDomain -}}
  {{- end }}
  - {{ $host }}
  {{- end }}
{{- end }}
{{- end }}
{{- end }}
