{{- $global := default (dict) .Values.spec.global -}}
{{- $serviceAccount := default (dict) $global.serviceAccount -}}
{{- if $serviceAccount.create }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ default (include "app.fullname" .) $serviceAccount.name }}
  namespace: {{ default "default" $global.namespace }}
  labels:
    {{- include "app.commonLabels" . | nindent 4 }}
    {{- with $global.labels }}
{{ toYaml . | nindent 4 }}
    {{- end }}
  {{- with $serviceAccount.annotations }}
  annotations:
{{ toYaml . | nindent 4 }}
  {{- end }}
{{- end }}

