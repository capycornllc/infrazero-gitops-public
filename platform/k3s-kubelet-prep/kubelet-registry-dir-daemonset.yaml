apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: k3s-kubelet-registry-dir
  namespace: kube-system
  labels:
    app.kubernetes.io/name: k3s-kubelet-registry-dir
    app.kubernetes.io/part-of: infrazero-platform
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: k3s-kubelet-registry-dir
  template:
    metadata:
      labels:
        app.kubernetes.io/name: k3s-kubelet-registry-dir
    spec:
      tolerations:
      - operator: Exists
      nodeSelector:
        kubernetes.io/os: linux
      containers:
      - name: ensure-dir
        image: alpine:3.20
        securityContext:
          privileged: true
        command:
        - sh
        - -ec
        - |
          ensure_dir() {
            target="$1"
            if [ -e "$target" ] && [ ! -d "$target" ]; then
              rm -f "$target"
            fi
            mkdir -p "$target"
            chmod 755 "$target"
          }

          ensure_dir /host/var/lib/rancher/k3s/agent/kubelet/plugins_registry
          ensure_dir /host/var/lib/rancher/k3s/agent/kubelet/plugins/csi-secrets-store
          ensure_dir /host/var/lib/kubelet/plugins_registry
          ensure_dir /host/var/lib/kubelet/plugins/csi-secrets-store
          sleep 3600
        resources:
          requests:
            cpu: 5m
            memory: 16Mi
          limits:
            cpu: 50m
            memory: 64Mi
        volumeMounts:
        - name: host-root
          mountPath: /host
      volumes:
      - name: host-root
        hostPath:
          path: /
          type: Directory
