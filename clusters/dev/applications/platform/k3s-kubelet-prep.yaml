apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: k3s-kubelet-prep
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-10"
spec:
  project: cluster-dev
  source:
    repoURL: https://github.com/your-org/your-repo
    targetRevision: main
    path: platform/k3s-kubelet-prep
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
    - SkipDryRunOnMissingResource=true
