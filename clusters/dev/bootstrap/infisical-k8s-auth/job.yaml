apiVersion: batch/v1
kind: Job
metadata:
  name: infisical-k8s-auth-bootstrap
  namespace: infisical-bootstrap
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: infisical-k8s-auth-bootstrap
    spec:
      serviceAccountName: infisical-k8s-auth-bootstrap
      restartPolicy: Never
      initContainers:
      - name: install-deps
        image: alpine:3.19
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
        - apk add --no-cache bash curl jq kubectl coreutils ca-certificates >/dev/null 2>&1 && cp /usr/bin/bash /usr/bin/curl /usr/bin/jq /usr/local/bin/kubectl /usr/bin/base64 /shared-bin/ && echo OK
        volumeMounts:
        - name: shared-bin
          mountPath: /shared-bin
      containers:
      - name: bootstrap
        image: alpine:3.19
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        args:
        - |
          export PATH="/shared-bin:$PATH"
          if [ -f /etc/ssl/custom/ca.crt ]; then
            cp /etc/ssl/custom/ca.crt /usr/local/share/ca-certificates/infrazero.crt
            update-ca-certificates 2>/dev/null || true
            export CURL_CA_BUNDLE=/etc/ssl/custom/ca.crt
            export SSL_CERT_FILE=/etc/ssl/custom/ca.crt
          fi
          # Fallback: try apk add if shared-bin is empty (initContainer succeeded)
          if ! command -v bash >/dev/null 2>&1; then
            apk add --no-cache bash curl jq kubectl coreutils ca-certificates 2>/dev/null || true
          fi
          /bin/bash /scripts/entrypoint.sh || bash /scripts/entrypoint.sh
        env:
        - name: INFRAZERO_ENV
          value: dev
        volumeMounts:
        - name: scripts
          mountPath: /scripts
        - name: shared-bin
          mountPath: /shared-bin
        - name: ca-cert
          mountPath: /etc/ssl/custom
          readOnly: true
      volumes:
      - name: scripts
        configMap:
          name: infisical-k8s-auth-bootstrap
          defaultMode: 0755
      - name: shared-bin
        emptyDir: {}
      - name: ca-cert
        configMap:
          name: infrazero-ca-cert
          optional: true
